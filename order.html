<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
    
  <div class="logo">ORDER <span>REQUEST</span></div>

  <nav>
    <a href="index.html">HOME</a>
    <a href="about.html">ABOUT US</a>
    <a href="contact.html">CONTACT US</a>
    <a href="products.html">FEATURED PRODUCTS</a>
    <a href="suppliers.html">TOP SUPPLIERS</a>
    <a href="order.html">ORDER REQUEST</a>
  </nav>
</header>
<section class="order">
    <h2>ORDER FORM</h2>

    <form action="#" method="post">
        
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>

        <label for="address">Address</label>
        <input type="text" id="address" name="address" placeholder="Enter your address" required>

        <label for="product">Product</label>
        <input type="text" id="product" name="product" placeholder="Enter product name" required>

        <label for="category">Category</label>
        <select id="category" name="category" required>
            <option value="">Select Category</option>
            <option>Groceries&Food</option>
            <option>Cleaning&Household Products</option>
            <option>Clothing&Textiles</option>
            <option>Electronics&accessories</option>
            <option>Drinks&Beverages</option>
            <option>Stationery</option>
        </select>

        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" placeholder="Enter quantity" required>

        <label for="payment method">Payment method</label>
        <select id="payment method" name="Payment method" required>
            <option value="">payment method</option>
            <option>Cash On Delivery</option>
            <option>Bank Transfer</option>
            <option>Mobile money</option>
            <option>Credit/debit</option>
        </select>

        <button type=" submit">Submit order</button>

    </form>
</section>
<footer>
  <p>© 2026 Sunbet Wholesale. All rights reserved.</p>
</footer>
</body>
</html>
